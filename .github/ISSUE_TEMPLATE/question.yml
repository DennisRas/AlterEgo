name: "Question / Support"
description: "Ask a question about using this addon"
title: "[Question] "
labels: ["Question"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to ask a question!
        Please fill out the following fields to help us answer your question.

  - type: textarea
    id: question
    attributes:
      label: "Your question"
      description: "Describe what you're unsure about."
      placeholder: "How do I...?"

  - type: textarea
    id: screenshots
    attributes:
      label: "Screenshots"
      description: "Upload screenshots here or paste image links."
